<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military RFID Weapon Tracking System</title>
    <!-- Google Fonts & FontAwesome for Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --army-green: #4b5320;
            --dark-bg: #1a1a1a;
            --accent-gold: #c5a059;
            --danger: #ff4d4d;
            --success: #00ff88;
            --text-gray: #b0b0b0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--army-green);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            color: var(--accent-gold);
            margin: 0;
        }

        /* Tabs Menu */
        nav {
            display: flex;
            justify-content: center;
            background: #222;
            padding: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            padding: 10px 25px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
        }

        .container {
            max-width: 1200px;
            width: 95%;
            margin: 20px auto;
            flex-grow: 1;
        }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Styles */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 5px;
            border: 1px solid #333;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-gold);
        }

        .stat-card h3 { color: var(--text-gray); margin-top: 0; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p { font-size: 2.2rem; font-weight: bold; margin: 10px 0 0; font-family: 'Orbitron', sans-serif; }

        /* Inventory Grid */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .weapon-card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .weapon-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); }

        .weapon-img {
            height: 150px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background-size: cover;
            background-position: center;
        }

        .weapon-info { padding: 15px; }
        .weapon-info h4 { margin: 0; color: var(--accent-gold); }
        .weapon-info p { font-size: 0.85rem; color: #999; margin: 5px 0; }

        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .detected { background: rgba(0, 255, 136, 0.2); color: var(--success); }
        .missing { background: rgba(255, 77, 77, 0.2); color: var(--danger); }

        .scan-container { text-align: center; margin-bottom: 40px; }
        .action-btn {
            background: var(--army-green);
            color: white;
            border: 1px solid var(--accent-gold);
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover { background: #5e6828; box-shadow: 0 0 15px var(--accent-gold); }

        /* Settings Page */
        .settings-card { background: #2a2a2a; padding: 20px; border-radius: 5px; max-width: 600px; margin: 0 auto; }
        .settings-card input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; }

    </style>
</head>
<body>

<header>
    <h1>ARMORY RFID TRACKING SYSTEM</h1>
</header>

<nav>
    <button class="tab-btn active" onclick="showPage('dashboard')">DASHBOARD</button>
    <button class="tab-btn" onclick="showPage('inventory')">INVENTORY</button>
    <button class="tab-btn" onclick="showPage('settings')">SETTINGS</button>
</nav>

<div class="container">
    
    <!-- DASHBOARD PAGE -->
    <div id="dashboard" class="page active">
        <div class="scan-container">
            <button class="action-btn" id="scanBtn" onclick="runRfidScan()">INITIALIZE RFID SCAN</button>
            <p id="scanStatus" style="margin-top: 10px; color: var(--text-gray);">System Ready</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Units</h3>
                <p id="totalCount">8</p>
            </div>
            <div class="stat-card">
                <h3>Verified (In Box)</h3>
                <p id="verifiedCount" style="color: var(--success);">0</p>
            </div>
            <div class="stat-card">
                <h3>Missing / Removed</h3>
                <p id="missingCount" style="color: var(--danger);">8</p>
            </div>
        </div>
    </div>

    <!-- INVENTORY PAGE -->
    <div id="inventory" class="page">
        <h2 style="font-family: 'Orbitron'; border-bottom: 1px solid #333; padding-bottom: 10px;">Weapon Storage Units</h2>
        <div class="inventory-grid" id="inventoryGrid">
            <!-- Items will be loaded by JS -->
        </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings" class="page">
        <div class="settings-card">
            <h2>System Configuration</h2>
            <label>RFID Reader Sensitivity</label>
            <input type="range" min="1" max="100" value="85">
            <label>Operator Name</label>
            <input type="text" placeholder="Enter commander name...">
            <label>Security Level</label>
            <select style="width: 100%; padding: 10px; background: #1a1a1a; color: white; border: 1px solid #444;">
                <option>Level 1 - Standard</option>
                <option>Level 2 - Restricted</option>
                <option>Level 3 - Top Secret</option>
            </select>
            <button class="action-btn" style="margin-top: 20px; width: 100%;">SAVE SETTINGS</button>
        </div>
    </div>

</div>

<script>
    // Weapon Database
    const weapons = [
        { id: "TAG-M4-01", name: "M4 Carbine", type: "Rifle", img: "🔫", inStock: false },
        { id: "TAG-G17-02", name: "Glock 17", type: "Handgun", img: "🔫", inStock: false },
        { id: "TAG-AK-03", name: "AK-12", type: "Rifle", img: "🔫", inStock: false },
        { id: "TAG-MP5-04", name: "MP5 SD", type: "SMG", img: "🔫", inStock: false },
        { id: "TAG-M24-05", name: "M24 Sniper", type: "Sniper", img: "🔫", inStock: false },
        { id: "TAG-SIG-06", name: "SIG Sauer", type: "Handgun", img: "🔫", inStock: false },
        { id: "TAG-AUG-07", name: "Steyr AUG", type: "Rifle", img: "🔫", inStock: false },
        { id: "TAG-UMP-08", name: "UMP-45", type: "SMG", img: "🔫", inStock: false }
    ];

    function showPage(pageId) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Show selected
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function renderInventory() {
        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = '';
        
        let verified = 0;

        weapons.forEach(w => {
            if(w.inStock) verified++;
            const card = document.createElement('div');
            card.className = 'weapon-card';
            card.innerHTML = `
                <div class="weapon-img">${w.img}</div>
                <div class="weapon-info">
                    <h4>${w.name}</h4>
                    <p>Serial: ${w.id}</p>
                    <p>Class: ${w.type}</p>
                    <span class="status-pill ${w.inStock ? 'detected' : 'missing'}">
                        ${w.inStock ? '● Detected' : '○ Missing'}
                    </span>
                </div>
            `;
            grid.appendChild(card);
        });

        document.getElementById('verifiedCount').innerText = verified;
        document.getElementById('missingCount').innerText = weapons.length - verified;
        document.getElementById('totalCount').innerText = weapons.length;
    }

    function runRfidScan() {
        const btn = document.getElementById('scanBtn');
        const status = document.getElementById('scanStatus');
        
        btn.innerText = "SCANNING FREQUENCIES...";
        btn.disabled = true;
        status.innerText = "Connecting to RFID UHF Reader...";

        setTimeout(() => {
            weapons.forEach(w => {
                w.inStock = Math.random() > 0.3; // %70 probability in stock
            });
            renderInventory();
            btn.innerText = "INITIALIZE RFID SCAN";
            btn.disabled = false;
            status.innerText = "Scan Complete. Inventory Updated.";
        }, 1500);
    }

    // Initial Load
    renderInventory();
</script>

</body>
</html>

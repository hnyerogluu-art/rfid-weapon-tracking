<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military RFID Weapon Tracking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --army-green: #4b5320; --dark-bg: #1a1a1a; --accent-gold: #c5a059; --danger: #ff4d4d; --success: #00ff88; --text-gray: #b0b0b0; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--army-green); }
        header h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 3px; color: var(--accent-gold); margin: 0; }
        nav { display: flex; justify-content: center; background: #222; padding: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-gray); padding: 10px 25px; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s; }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); }
        .container { max-width: 1200px; width: 95%; margin: 20px auto; flex-grow: 1; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #2a2a2a; padding: 25px; border-radius: 5px; border: 1px solid #333; text-align: center; position: relative; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-gold); }
        .stat-card p { font-size: 2.2rem; font-weight: bold; margin: 10px 0 0; font-family: 'Orbitron', sans-serif; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .weapon-card { background: #2a2a2a; border-radius: 8px; overflow: hidden; border: 1px solid #444; transition: 0.3s; text-align: center; }
        
        /* RESİM BURADA DÜZELTİLİYOR */
        .weapon-img-container {
            height: 160px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .weapon-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .weapon-info { padding: 15px; }
        .status-pill { display: inline-block; padding: 4px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .detected { background: rgba(0, 255, 136, 0.2); color: var(--success); }
        .missing { background: rgba(255, 77, 77, 0.2); color: var(--danger); }
        .action-btn { background: var(--army-green); color: white; border: 1px solid var(--accent-gold); padding: 15px 40px; font-family: 'Orbitron', sans-serif; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>ARMORY RFID TRACKING SYSTEM</h1></header>
<nav>
    <button class="tab-btn active" onclick="showPage('dashboard')">DASHBOARD</button>
    <button class="tab-btn" onclick="showPage('inventory')">INVENTORY</button>
</nav>

<div class="container">
    <div id="dashboard" class="page active">
        <div style="text-align: center; margin-bottom: 40px;">
            <button class="action-btn" id="scanBtn" onclick="runRfidScan()">INITIALIZE RFID SCAN</button>
        </div>
        <div class="stats-row">
            <div class="stat-card"><h3>Total Units</h3><p id="totalCount">8</p></div>
            <div class="stat-card"><h3>Verified</h3><p id="verifiedCount" style="color: var(--success);">0</p></div>
            <div class="stat-card"><h3>Missing</h3><p id="missingCount" style="color: var(--danger);">8</p></div>
        </div>
    </div>

    <div id="inventory" class="page">
        <div class="inventory-grid" id="inventoryGrid"></div>
    </div>
</div>

<script>
    // RESİM LİNKLERİNİ BURAYA YAPIŞTIR
   const weapons = [
    { id: "TAG-M4-01", name: "M4 Carbine", type: "Rifle", img: "m4.png", inStock: false },
    { id: "TAG-G17-02", name: "Glock 17", type: "Handgun", img: "glock.png", inStock: false },
    { id: "TAG-AK-03", name: "AK-12", type: "Rifle", img: "ak12.png", inStock: false },
    { id: "TAG-MP5-04", name: "MP5 SD", type: "SMG", img: "mp5.png", inStock: false },
    { id: "TAG-M24-05", name: "M24 Sniper", type: "Sniper", img: "m24.png", inStock: false },
    { id: "TAG-SIG-06", name: "SIG Sauer P320", type: "Handgun", img: "sig.png", inStock: false },
    { id: "TAG-AUG-07", name: "Steyr AUG", type: "Rifle", img: "aug.png", inStock: false },
    { id: "TAG-UMP-08", name: "UMP-45", type: "SMG", img: "ump.png", inStock: false }
];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function renderInventory() {
        const grid = document.getElementById('inventoryGrid');
        grid.innerHTML = '';
        let verified = 0;

        weapons.forEach(w => {
            if(w.inStock) verified++;
            const card = document.createElement('div');
            card.className = 'weapon-card';
            card.innerHTML = `
                <div class="weapon-img-container">
                    <img src="${w.img}" alt="${w.name}">
                </div>
                <div class="weapon-info">
                    <h4 style="color:var(--accent-gold);margin:0;">${w.name}</h4>
                    <p style="font-size:0.8rem;color:#999;">Serial: ${w.id}</p>
                    <span class="status-pill ${w.inStock ? 'detected' : 'missing'}">
                        ${w.inStock ? '● Detected' : '○ Missing'}
                    </span>
                </div>
            `;
            grid.appendChild(card);
        });

        document.getElementById('verifiedCount').innerText = verified;
        document.getElementById('missingCount').innerText = weapons.length - verified;
    }

    function runRfidScan() {
        const btn = document.getElementById('scanBtn');
        btn.innerText = "SCANNING...";
        setTimeout(() => {
            weapons.forEach(w => w.inStock = Math.random() > 0.3);
            renderInventory();
            btn.innerText = "INITIALIZE RFID SCAN";
        }, 1000);
    }
    renderInventory();
</script>
</body>
</html>
